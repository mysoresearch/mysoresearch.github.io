name: Daily Market Data Update

on:
  schedule:
    # Every hour, 1 PM–11 PM ET (18:00–04:00 UTC) — runs daily including weekends
    - cron: '0 18-23 * * *'
    - cron: '0 0-4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance

      - name: Fetch market data into SQLite
        run: python scripts/fetch_data.py

      - name: Commit updated database
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/market.db
          git diff --cached --quiet || git commit -m "chore: daily market data update $(date -u '+%Y-%m-%d')"
          git push
