name: Daily Market Data Update

on:
  schedule:
    # Every 30 min during US market hours Mon–Fri (13:30–21:00 UTC = 9:30 AM–5:00 PM ET)
    - cron: '*/30 13-21 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance

      - name: Fetch market data into SQLite
        run: python scripts/fetch_data.py

      - name: Commit updated database
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/market.db
          git diff --cached --quiet || git commit -m "chore: daily market data update $(date -u '+%Y-%m-%d')"
          git push
