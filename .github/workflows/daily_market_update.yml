name: Daily Market Data Update

on:
  schedule:
    # 13:00 UTC = 8:00 AM EST / 9:00 AM EDT — before US market open (9:30 AM ET)
    - cron: '0 13 * * 1-5'
  workflow_dispatch: # allow manual trigger from GitHub Actions UI

permissions:
  contents: write

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance

      - name: Fetch market data
        run: python scripts/fetch_data.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/market_data.json
          git diff --cached --quiet || git commit -m "chore: daily market data update $(date -u '+%Y-%m-%d')"
          git push
