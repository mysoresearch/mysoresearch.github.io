<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mysoresearch</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #fafafa;
      --surface: #ffffff;
      --border:  #dbdbdb;
      --text:    #262626;
      --muted:   #8e8e8e;
      --blue:    #0095f6;
      --green:   #1a7f37;
      --red:     #d93025;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* ── Top bar ── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.75rem 1rem;
    }

    .topbar h1 {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text);
      font-family: 'Georgia', serif;
    }

    .topbar .updated {
      position: absolute;
      right: 1rem;
      font-size: 0.7rem;
      color: var(--muted);
    }

    /* ── Stories / sector filter ── */
    .stories-wrap {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0.85rem 1rem;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .stories-wrap::-webkit-scrollbar { display: none; }

    .stories {
      display: flex;
      gap: 1.1rem;
      width: max-content;
      margin: 0 auto;
    }

    .story {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.35rem;
      cursor: pointer;
      border: none;
      background: none;
    }

    .story-ring {
      width: 62px;
      height: 62px;
      border-radius: 50%;
      padding: 2px;
      background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
    }

    .story-ring.active {
      background: var(--blue);
    }

    .story-ring.inactive {
      background: var(--border);
    }

    .story-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 2px solid white;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
    }

    .story span {
      font-size: 0.7rem;
      color: var(--text);
      font-weight: 500;
      max-width: 62px;
      text-align: center;
    }

    /* ── Feed ── */
    .feed {
      max-width: 935px;
      margin: 1.25rem auto;
      padding: 0 0.75rem;
    }

    /* ── Section label ── */
    .section-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 0.75rem;
      padding-left: 0.25rem;
    }

    /* ── News grid ── */
    .news-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 3px;
      margin-bottom: 2.5rem;
    }

    @media (max-width: 640px) {
      .news-grid { grid-template-columns: repeat(2, 1fr); }
    }

    .news-card {
      position: relative;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      display: block;
      text-decoration: none;
      background: #efefef;
    }

    .news-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s ease;
    }

    .news-card:hover img { transform: scale(1.04); }

    /* Gradient placeholder when no image */
    .news-card .placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      text-align: center;
    }

    .placeholder.energy  { background: linear-gradient(135deg, #f0a500, #e07b00); }
    .placeholder.bio     { background: linear-gradient(135deg, #1a7f37, #2da44e); }
    .placeholder.ai      { background: linear-gradient(135deg, #6e40c9, #9a6dd7); }

    .placeholder .pticker {
      font-size: 1.1rem;
      font-weight: 800;
      color: rgba(255,255,255,0.9);
      font-family: monospace;
    }

    .placeholder .ptitle {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.75);
      margin-top: 0.4rem;
      line-height: 1.35;
    }

    /* Hover overlay */
    .news-card .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0);
      display: flex;
      align-items: flex-end;
      transition: background 0.25s;
    }

    .news-card:hover .overlay { background: rgba(0,0,0,0.45); }

    .overlay-text {
      padding: 0.75rem;
      opacity: 0;
      transition: opacity 0.25s;
    }

    .news-card:hover .overlay-text { opacity: 1; }

    .overlay-title {
      font-size: 0.75rem;
      font-weight: 600;
      color: #fff;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .overlay-meta {
      font-size: 0.65rem;
      color: rgba(255,255,255,0.75);
      margin-top: 0.25rem;
    }

    /* ── Stocks strip ── */
    .stocks-strip {
      display: flex;
      gap: 0.5rem;
      overflow-x: auto;
      padding-bottom: 0.5rem;
      margin-bottom: 2.5rem;
      scrollbar-width: none;
    }

    .stocks-strip::-webkit-scrollbar { display: none; }

    .stock-pill {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.55rem 0.9rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      min-width: 130px;
    }

    .stock-pill .sp-ticker {
      font-size: 0.8rem;
      font-weight: 700;
      font-family: monospace;
      color: var(--text);
    }

    .stock-pill .sp-name {
      font-size: 0.65rem;
      color: var(--muted);
    }

    .stock-pill .sp-right { margin-left: auto; text-align: right; }

    .stock-pill .sp-price {
      font-size: 0.78rem;
      font-weight: 600;
      font-family: monospace;
      color: var(--text);
    }

    .stock-pill .sp-chg {
      font-size: 0.72rem;
      font-weight: 700;
      font-family: monospace;
    }

    .sp-chg.up   { color: var(--green); }
    .sp-chg.down { color: var(--red); }

    /* ── Disclaimer ── */
    .disclaimer {
      max-width: 935px;
      margin: 0 auto 2rem;
      padding: 0 1rem;
      font-size: 0.75rem;
      color: var(--muted);
      line-height: 1.6;
      text-align: center;
    }

    footer {
      text-align: center;
      padding: 1.25rem;
      font-size: 0.75rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }

    .hidden { display: none; }
  </style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <h1>mysoresearch</h1>
  <span class="updated" id="updated-at"></span>
</div>

<!-- Stories / sector selector -->
<div class="stories-wrap">
  <div class="stories">
    <button class="story" onclick="setActive('All')" id="story-All">
      <div class="story-ring active"><div class="story-inner">&#127758;</div></div>
      <span>All</span>
    </button>
    <button class="story" onclick="setActive('Energy')" id="story-Energy">
      <div class="story-ring inactive"><div class="story-inner">&#9762;</div></div>
      <span>Energy</span>
    </button>
    <button class="story" onclick="setActive('Biosciences')" id="story-Biosciences">
      <div class="story-ring inactive"><div class="story-inner">&#129516;</div></div>
      <span>Biosciences</span>
    </button>
    <button class="story" onclick="setActive('AI')" id="story-AI">
      <div class="story-ring inactive"><div class="story-inner">&#129504;</div></div>
      <span>AI</span>
    </button>
  </div>
</div>

<!-- Main feed -->
<div class="feed" id="feed">
  <p style="color:#8e8e8e;font-size:.85rem;padding:2rem 0 0;text-align:center">Loading...</p>
</div>

<div class="disclaimer">
  For educational and informational purposes only. Not financial advice. Investing involves risk.
  Always consult a licensed financial advisor before making investment decisions.
</div>

<footer>&copy; 2026 Mysoresearch</footer>

<script>
  let DATA = {};
  const SECTOR_CLASS = { Energy: 'energy', Biosciences: 'bio', AI: 'ai' };
  let activeSector = 'All';

  function fmt(v)  { return (v >= 0 ? '+' : '') + v.toFixed(2) + '%'; }
  function cls(v)  { return v >= 0 ? 'up' : 'down'; }

  function stockPill(s) {
    return `<div class="stock-pill">
      <div>
        <div class="sp-ticker">${s.ticker}</div>
        <div class="sp-name">${s.name}</div>
      </div>
      <div class="sp-right">
        <div class="sp-price">$${s.close.toFixed(2)}</div>
        <div class="sp-chg ${cls(s.change)}">${fmt(s.change)}</div>
      </div>
    </div>`;
  }

  function newsCard(a) {
    const sc = SECTOR_CLASS[a.sector] || 'ai';
    const img = a.thumbnail
      ? `<img src="${a.thumbnail}" alt="" loading="lazy" onerror="this.style.display='none';this.nextSibling.style.display='flex'">`
      : '';
    const placeholder = `<div class="placeholder ${sc}" ${a.thumbnail ? 'style="display:none"' : ''}>
        <div class="pticker">${a.ticker}</div>
        <div class="ptitle">${a.title.slice(0, 60)}${a.title.length > 60 ? '…' : ''}</div>
      </div>`;
    return `<a class="news-card" href="${a.url}" target="_blank" rel="noopener">
      ${img}${placeholder}
      <div class="overlay">
        <div class="overlay-text">
          <div class="overlay-title">${a.title}</div>
          <div class="overlay-meta">${a.publisher}${a.published ? ' · ' + a.published : ''}</div>
        </div>
      </div>
    </a>`;
  }

  function sectorBlock(sector, stocks, articles) {
    const stocksHtml = stocks.length
      ? `<div class="stocks-strip">${stocks.map(stockPill).join('')}</div>`
      : '';
    const newsHtml = articles.length
      ? `<div class="news-grid">${articles.map(newsCard).join('')}</div>`
      : '';
    return `<div class="section-label">${sector}</div>${stocksHtml}${newsHtml}`;
  }

  function render() {
    if (!DATA.sectors) return;
    const sectors = activeSector === 'All'
      ? Object.keys(DATA.sectors)
      : [activeSector];

    document.getElementById('feed').innerHTML = sectors.map(s =>
      sectorBlock(s, DATA.sectors[s] || [], (DATA.news || {})[s] || [])
    ).join('');
  }

  function setActive(sector) {
    activeSector = sector;
    document.querySelectorAll('.story').forEach(el => {
      const ring = el.querySelector('.story-ring');
      if (el.id === 'story-' + sector) {
        ring.className = 'story-ring' + (sector === 'All' ? ' active' : ' active');
      } else {
        ring.className = 'story-ring inactive';
      }
    });
    render();
  }

  fetch('data/market_data.json')
    .then(r => r.json())
    .then(data => {
      DATA = data;
      document.getElementById('updated-at').textContent = data.updated_at;
      render();
    })
    .catch(() => {
      document.getElementById('feed').innerHTML =
        '<p style="color:#8e8e8e;text-align:center;padding:2rem">Unable to load data.</p>';
    });
</script>

</body>
</html>
